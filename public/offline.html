<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width,initial-scale=1" />
    <title>Offline – Mohammed Tawfeq Amiri</title>
    <meta name="robots"
          content="noindex,nofollow" />
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
            background: #0b011e;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(155, 135, 245, 0.25);
            border-radius: 16px;
            padding: 2rem
        }

        h1 {
            font-size: 1.75rem;
            line-height: 1.2;
            margin: 0 0 1rem;
            background: linear-gradient(90deg, #9b87f5, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent
        }

        p {
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 1.25rem;
            color: #c7c9d3
        }

        a.btn {
            display: inline-block;
            padding: 0.75rem 1.25rem;
            border-radius: 999px;
            background: #9b87f5;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem
        }

        a.btn:hover {
            background: #8772e6
        }

        .hint {
            font-size: 0.7rem;
            opacity: .65;
            margin-top: 1.5rem
        }
    </style>
</head>

<body>
    <div class="card"
         role="alert"
         aria-live="polite">
        <h1>You are offline</h1>
        <p>The network connection seems unavailable. You can still view cached pages you opened previously. Once you are
            back online, content will refresh automatically.</p>
        <a class="btn"
           href="/">Retry Connection</a>
        <div class="hint">Offline shell provided by PWA cache · v1</div>
    </div>
</body>

</html>
