<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="35%" stop-color="#1A1F2C"/>
      <stop offset="70%" stop-color="#161927"/>
      <stop offset="100%" stop-color="#0d0f15"/>
    </linearGradient>
    <linearGradient id="purpleBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b87f5"/>
      <stop offset="50%" stop-color="#1EAEDB"/>
      <stop offset="100%" stop-color="#9b87f5"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b87f5" stop-opacity="0"/>
      <stop offset="20%" stop-color="#9b87f5"/>
      <stop offset="50%" stop-color="#1EAEDB"/>
      <stop offset="80%" stop-color="#9b87f5"/>
      <stop offset="100%" stop-color="#9b87f5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bubbleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b87f5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1EAEDB" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="bubbleGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7E69AB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D6BCFA" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bubbleGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1EAEDB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9b87f5" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b87f5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9b87f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topRightGlow" cx="85%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#1EAEDB" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1EAEDB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomLeftGlow" cx="10%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3xl"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="skillShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9b87f5" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#9b87f5" fill-opacity="0.1"/>
    </pattern>
  </defs>

