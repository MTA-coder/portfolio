  <circle cx="950" cy="380" r="7" fill="#1EAEDB" opacity="0.12"/>
  <circle cx="45" cy="240" r="5" fill="#7E69AB" opacity="0.2"/>
  <circle cx="1560" cy="240" r="4" fill="#D6BCFA" opacity="0.15"/>
